		<title>剑环 · Sword Ring</title>
		<style>
*{box-sizing:border-box}html,body,#canvas{margin:0;padding:0;border:0;width:100%;height:100%}body{color:#fff;background:#03080d;overflow:hidden;touch-action:none}#canvas{display:block}#canvas:focus{outline:none}
#rotate-notice{display:none;position:fixed;z-index:20;inset:0;align-items:center;justify-content:center;text-align:center;background:radial-gradient(circle at 50% 38%,rgba(42,191,231,.18),transparent 28%),#050c14;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}.rotate-card{width:min(82vw,360px);padding:34px 26px;border:1px solid rgba(105,223,247,.38);border-radius:24px;background:rgba(10,27,39,.86);box-shadow:0 20px 60px rgba(0,0,0,.35)}.rotate-icon{width:74px;height:50px;margin:0 auto 24px;border:3px solid #72e1f7;border-radius:9px;transform:rotate(-90deg);box-shadow:0 0 24px rgba(61,212,244,.42)}.rotate-title{font-size:24px;letter-spacing:.1em}.rotate-copy{margin-top:14px;color:#94b5c1;font-size:14px;line-height:1.8}.rotate-action{margin-top:24px;padding:13px 20px;border:1px solid #69dff7;border-radius:12px;color:#dffbff;background:rgba(42,191,231,.12);font-size:15px}@media (orientation:portrait) and (max-width:900px){#rotate-notice{display:flex}#canvas,#status{visibility:hidden!important}}
#status{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;visibility:hidden;background:radial-gradient(circle at 68% 46%,rgba(37,191,231,.09),transparent 32%),linear-gradient(145deg,#06111b,#03080d 58%,#07131c);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;overflow:hidden}
#status:before{content:"";position:absolute;inset:-30%;background:repeating-radial-gradient(circle at 68% 46%,transparent 0 83px,rgba(95,219,247,.035) 84px 85px);animation:breathe 6s ease-in-out infinite}.loader-shell{position:relative;width:min(82vw,720px);text-align:center}.brand-kicker{color:#69dff7;font-size:11px;letter-spacing:.42em;margin-bottom:22px;opacity:.78}.brand-title{margin:0;font-size:clamp(56px,8vw,96px);font-weight:300;letter-spacing:.22em;text-indent:.22em}.brand-subtitle{margin:15px 0 58px;color:#8fa5b2;font-size:14px;letter-spacing:.3em;text-indent:.3em}
.sword-ring{position:relative;width:142px;height:142px;margin:0 auto 62px;animation:orbit 7s linear infinite}.sword-ring:before,.sword-ring:after{content:"";position:absolute;border-radius:50%;inset:18px;border:1px solid rgba(105,223,247,.24)}.sword-ring:after{inset:46px;background:#43d8f4;border:8px solid rgba(67,216,244,.12);box-shadow:0 0 35px rgba(67,216,244,.45)}.blade{position:absolute;left:68px;top:-2px;width:6px;height:34px;border-radius:6px 6px 2px 2px;background:linear-gradient(#f6fbff 0 66%,#f5ae39 67% 76%,#8dceec 77%);transform-origin:3px 73px;transform:rotate(calc(var(--i)*51.428deg))}
.load-label{color:#b7c7cf;font-size:12px;letter-spacing:.2em;margin-bottom:13px}.load-percent{height:28px;color:#69dff7;font-size:22px;font-variant-numeric:tabular-nums;letter-spacing:.08em}#status-progress{display:none;width:min(72vw,420px);height:4px;margin:8px auto 0;border:0;border-radius:4px;background:rgba(255,255,255,.1);overflow:hidden}#status-progress::-webkit-progress-bar{background:rgba(255,255,255,.1)}#status-progress::-webkit-progress-value{background:linear-gradient(90deg,#34c5e5,#b8f6ff);box-shadow:0 0 14px #38d8f5}.load-hint{margin-top:16px;color:#607783;font-size:11px;letter-spacing:.08em}#status-notice{display:none;position:relative;max-width:560px;margin:42px auto 0;padding:22px 28px;color:#d8e4e9;line-height:1.75;font-size:14px;background:rgba(255,255,255,.055);border:1px solid rgba(124,218,237,.16);border-radius:16px}.loader-foot{margin-top:24px;color:#526873;font-size:10px;letter-spacing:.22em}@keyframes orbit{to{transform:rotate(360deg)}}@keyframes breathe{50%{opacity:.55;transform:scale(1.04)}}@media(max-height:700px){.brand-subtitle{margin-bottom:28px}.sword-ring{width:110px;height:110px;margin-bottom:28px;transform:scale(.8)}.loader-foot{margin-top:14px}}@media(prefers-reduced-motion:reduce){.sword-ring,#status:before{animation:none}}
</style>

<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>

	</head>
	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status"><div class="loader-shell">
<div class="brand-kicker">SWORD RING</div><h1 class="brand-title">剑环</h1><p class="brand-subtitle">以剑为甲 · 以环为锋</p>
<div class="sword-ring" aria-hidden="true"><span class="blade" style="--i:0"></span><span class="blade" style="--i:1"></span><span class="blade" style="--i:2"></span><span class="blade" style="--i:3"></span><span class="blade" style="--i:4"></span><span class="blade" style="--i:5"></span><span class="blade" style="--i:6"></span></div>
<div class="load-label" id="load-label">正在并行下载剑阵引擎</div><div class="load-percent" id="load-percent">0%</div><progress id="status-progress"></progress><div class="load-hint" id="load-hint">首次加载约 10 MB，第二次打开会更快</div><div id="status-notice"></div><div class="loader-foot">一百零五秒 · 一局定锋芒</div>
</div></div>
		<div id="rotate-notice"><div class="rotate-card"><div class="rotate-icon"></div><div class="rotate-title">请横屏持握</div><div class="rotate-copy">剑环为横屏战斗设计。<br>横过手机后，左右大按钮会完整展开。</div><div class="rotate-action">横过来，开始试剑</div></div></div>

		<script src="index.js?v=20260718-fast"></script>
		<script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":225364,"index.wasm":39509339},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

function requestLandscape() {
	if (screen.orientation && screen.orientation.lock) {
		screen.orientation.lock('landscape').catch(() => {});
}
window.requestSwordRingMotion = async function () {
	try {
		if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
			await DeviceMotionEvent.requestPermission();
		}
		if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
			await DeviceOrientationEvent.requestPermission();
		}
		window.swordRingMotionReady = true;
	} catch (_) {
		window.swordRingMotionReady = false;
	}
};
document.getElementById('rotate-notice').addEventListener('click', requestLandscape);
window.addEventListener('orientationchange', requestLandscape, { once: true });

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');
	const loadLabel = document.getElementById('load-label');
	const loadPercent = document.getElementById('load-percent');
	const loadHint = document.getElementById('load-hint');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	if (location.protocol === 'file:') {
		setStatusNotice('当前是本地文件模式，浏览器会阻止游戏引擎加载。\n请打开 http://localhost:3000/，或使用正式分享网址。');
		setStatusMode('notice');
		initializing = false;
		return;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				// Reload if there was no error.
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			// Display the message as usual
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
					const percent = Math.min(100, Math.round(current / total * 100));
					loadPercent.textContent = percent + '%';
					if (percent >= 100) {
						loadLabel.textContent = '下载完成 · 正在编译剑阵';
						loadHint.textContent = '手机正在完成最后准备，请再等几秒';
					}
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
					loadPercent.textContent = '连接中';
				}
			},
		}).then(() => {
			window.requestSwordRingMotion();
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
		</script>
